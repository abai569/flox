name: Sync GOST to Mirror

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to domestic mirror
        env:
          DOMESTIC_USER: ${{ secrets.DOMESTIC_USER }}
          DOMESTIC_PASS: ${{ secrets.DOMESTIC_PASS }}
          DOMESTIC_WEBDAV_URL: https://chfs.646321.xyz:8/webdav/flvx
        run: |
          echo "⬆️  Syncing to domestic mirror (parallel)..."
          curl -s -u "${DOMESTIC_USER}:${DOMESTIC_PASS}" \
            -T gost-amd64 \
            "${DOMESTIC_WEBDAV_URL}/gost-amd64" &
          curl -s -u "${DOMESTIC_USER}:${DOMESTIC_PASS}" \
            -T gost-arm64 \
            "${DOMESTIC_WEBDAV_URL}/gost-arm64" &
          wait
          echo "✅ Sync complete"
